services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plant_mgmt
      POSTGRES_USER: plant
      POSTGRES_PASSWORD: plant_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://plant:plant_pass@postgres:5432/plant_mgmt
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      - postgres
      - chromadb
    volumes:
      - ./backend:/app
      - ./backend/knowledge_base:/app/knowledge_base

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app
      - /app/node_modules

volumes:
  pgdata:
  chroma_data: